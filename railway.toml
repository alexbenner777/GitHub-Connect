[build]
buildCommand = "pnpm install --no-frozen-lockfile && pnpm --filter @workspace/trends-landing run build:railway && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "NODE_ENV=production PORT=8080 node --enable-source-maps artifacts/api-server/dist/index.mjs"
healthcheckPath = "/api/health"
restartPolicyType = "ON_FAILURE"
