services:
  - type: web
    name: trends-landing
    runtime: node
    buildCommand: bash build-render.sh
    startCommand: NODE_ENV=production node --enable-source-maps artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
