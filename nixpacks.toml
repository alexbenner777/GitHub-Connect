[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install -g pnpm@10", "pnpm install --frozen-lockfile --ignore-scripts"]

[phases.build]
cmds = ["pnpm --filter @workspace/trends-landing run build:railway"]

[start]
cmd = "pnpm --filter @workspace/trends-landing run serve:railway"
